<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Feliz Día de la Mujer</title>

<style>

body{
margin:0;
background:black;
font-family:Arial;
color:white;
text-align:center;
overflow-x:hidden;
}

.container{
padding:40px 20px;
max-width:600px;
margin:auto;
}

button{
padding:14px 24px;
font-size:16px;
background:#111;
color:white;
border:1px solid #444;
border-radius:25px;
margin-top:25px;
}

/* galeria */

.galeria{
display:none;
margin-top:30px;
}

.slide{
display:none;
animation:fade 1.5s;
}

.slide img{
width:90%;
border-radius:12px;
box-shadow:0 0 25px rgba(255,255,255,0.15);
}

@keyframes fade{
from{opacity:0; transform:scale(0.95)}
to{opacity:1; transform:scale(1)}
}

/* mensaje final */

.mensajeFinal{
display:none;
font-size:20px;
margin-top:30px;
line-height:1.6;
animation:fade 2s;
}

/* vela */

.candle{
position:fixed;
bottom:20px;
left:20px;
width:30px;
height:120px;
background:linear-gradient(#f5f5f5,#bbb);
border-radius:6px;
}

.wick{
position:absolute;
top:-10px;
left:50%;
width:3px;
height:10px;
background:black;
transform:translateX(-50%);
}

.flame{
position:absolute;
top:-34px;
left:50%;
width:22px;
height:36px;
background:radial-gradient(circle,#fff,#ffd000,#ff7a00);
border-radius:50%;
transform:translateX(-50%);
box-shadow:
0 0 10px #ffcc00,
0 0 25px #ff9900;
animation:flicker 0.12s infinite alternate;
}

@keyframes flicker{
0%{transform:translateX(-50%) scale(1)}
100%{transform:translateX(-50%) scale(1.08)}
}

/* gerbera */

.gerbera{
position:fixed;
bottom:15px;
right:15px;
width:90px;
opacity:0.95;
}

</style>

</head>

<body>

<!-- GERBERA -->

<img class="gerbera" src="gerbera.png">

<!-- VELA -->

<div class="candle">

<div class="wick"></div>
<div class="flame"></div>

</div>

<div class="container">

<h2>Hoy es un día especial</h2>

<p>Un pequeño detalle para recordarte lo valiosa que eres.</p>

<button onclick="mostrarGaleria()">Descubrir</button>

<div class="galeria" id="galeria">

<div class="slide">
<img src="foto1.jpeg">
</div>

<div class="slide">
<img src="foto2.jpeg">
</div>

<div class="slide">
<img src="foto3.jpeg">
</div>

<button onclick="mostrarMensaje()">Un mensaje más...</button>

</div>

<div class="mensajeFinal" id="mensaje">

<p>
Hoy celebramos la fuerza,  
la sensibilidad y la belleza  
que hay en ti.
</p>

<p>
Que nunca olvides lo extraordinaria que eres.
</p>

<h3>Feliz Día de la Mujer 🌼</h3>

</div>

</div>

<script>

function mostrarGaleria(){

document.getElementById("galeria").style.display="block"
mostrarSlide(0)

}

let slideIndex=0
let slides=document.getElementsByClassName("slide")

function mostrarSlide(n){

for(let i=0;i<slides.length;i++){

slides[i].style.display="none"

}

slides[n].style.display="block"

}

let startX=0

document.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX
})

document.addEventListener("touchend",e=>{

let endX=e.changedTouches[0].clientX

if(endX < startX-50){
slideIndex++
}

if(endX > startX+50){
slideIndex--
}

if(slideIndex>=slides.length){
slideIndex=0
}

if(slideIndex<0){
slideIndex=slides.length-1
}

mostrarSlide(slideIndex)

})

function mostrarMensaje(){

document.getElementById("mensaje").style.display="block"

}

</script>

</body>
</html>
